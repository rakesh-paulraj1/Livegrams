name: Deploy Web App

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Docker/Dockerfile.web
          push: true
          tags: |
            rakeshpaulraj/web:${{ github.sha }}
      - name: Deploy to server
        run: |
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
          chmod 600 ~/ssh_key

          ssh -o StrictHostKeyChecking=no -i ~/ssh_key azureuser@57.159.28.23 << ENDSSH
          docker pull rakeshpaulraj/web:${{ github.sha }}

          docker stop web_app 2>/dev/null || true
          docker rm web_app 2>/dev/null || true

          docker run -d --restart unless-stopped \
            --name web_app \
            -p 3000:3000 \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
            -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            rakeshpaulraj/web:${{ github.sha }}
          ENDSSH

          rm -f ~/ssh_key
